services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      WEB_ORIGIN: http://localhost:5173
      JWT_SECRET: local-compose-secret
      DATABASE_URL: postgresql://momentra:momentra@postgres:5432/momentra
      REDIS_URL: redis://redis:6379
    volumes:
      - momentra_uploads:/app/server/uploads
      - momentra_data:/app/server/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: momentra
      POSTGRES_PASSWORD: momentra
      POSTGRES_DB: momentra
    ports:
      - "5432:5432"
    volumes:
      - momentra_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  momentra_uploads:
  momentra_data:
  momentra_pg:
